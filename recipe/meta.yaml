{% set name = "visions" %}
{% set version = "0.8.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/visions-{{ version }}.tar.gz
  sha256: 37f55c37d7bcf124054e612850b28a4f0bab9b200733cedd8f1781c3ac5cc3f0

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - setuptools >=61.0.0
    - wheel
    - pip
    - python >=3.9
  run:
    - attrs >=19.3.0
    - networkx >=2.4
    - numpy >=1.23.2
    - pandas >=2.0.0
    - python >=3.9
    - multimethod >=1.4
    - puremagic

test:
  imports:
    - visions
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/dylan-profiler/visions
  license: BSD-4-Clause
  license_family: BSD
  license_file: LICENSE
  summary: |
    Visions provides an extensible suite of tools to support common data analysis operations including 
    type inference on unknown data, casting data types and automated data summarization.
  doc_url: https://dylan-profiler.github.io/visions/
  dev_url: https://github.com/dylan-profiler/visions

extra:
  recipe-maintainers:
    - philip-khor
